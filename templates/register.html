{% extends "base.html" %}
{% block title %}Create Account – REGS{% endblock %}
{% block content %}
<div style="max-width:520px; margin:2rem auto;">
  <div class="card">
    <h1>Create Student Account</h1>
    <form method="POST">
      <div class="grid-2">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" name="first_name" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" name="last_name" required>
        </div>
      </div>
      <div class="form-group">
        <label>University ID (UID) – 8 digits</label>
        <input type="text" name="uid" required maxlength="8" pattern="\d{8}" placeholder="12345678">
      </div>
      <div class="form-group">
        <label>Program</label>
        <select name="program" required>
          <option value="Masters">Masters</option>
          <option value="PhD">PhD</option>
        </select>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required minlength="6">
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" name="address" placeholder="Optional">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="Optional">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
    </form>
    <p class="text-center mt-2 text-small">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
