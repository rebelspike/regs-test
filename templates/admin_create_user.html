{% extends "base.html" %}
{% block title %}Create User – REGS{% endblock %}
{% block content %}
<div class="page-header">
  <h1>+ Create New User</h1>
  <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">← Back</a>
</div>
<div style="max-width:480px;">
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" name="display_name" required placeholder="e.g. Dr. Williams">
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required minlength="6">
      </div>
      <div class="form-group">
        <label>Role</label>
        <select name="role" required>
          <option value="faculty">Faculty</option>
          <option value="gs">Grad Secretary</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Create User</button>
    </form>
  </div>
</div>
{% endblock %}
