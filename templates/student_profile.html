{% extends "base.html" %}
{% block title %}My Profile – REGS{% endblock %}
{% block content %}
<div class="page-header">
  <h1>✏️ Edit Profile</h1>
  <a href="{{ url_for('student_dashboard') }}" class="btn btn-secondary">← Back</a>
</div>
<div style="max-width:520px;">
  <div class="card">
    <div class="mb-2" style="padding-bottom:1rem; border-bottom:1px solid #e5e7eb;">
      <div class="text-small text-muted">Name (read-only)</div>
      <div style="font-size:1.1rem; font-weight:700;">{{ student.first_name }} {{ student.last_name }}</div>
      <div class="text-small text-muted mt-1">UID (read-only)</div>
      <div style="font-weight:600;">{{ student.uid }}</div>
      <div class="text-small text-muted mt-1">Program (read-only)</div>
      <div style="font-weight:600;">{{ student.program }}</div>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Address</label>
        <input type="text" name="address" value="{{ student.address or '' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ student.email or '' }}">
      </div>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
  </div>
</div>
{% endblock %}
